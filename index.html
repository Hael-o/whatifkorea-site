<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>만약 대한민국이라면 · 페르소나 의견 탐색</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
/* ============================================================
   만약 대한민국이라면 — design tokens
   자체 아이덴티티: 코발트 액센트 · 쿨 뉴트럴 · 각진 대시보드 셰입
   (레퍼런스와 같은 장르, 다른 디자인 언어)
   ============================================================ */
:root{
  --bg:#eef1f5;
  --surface:#ffffff;
  --surface-2:#f3f5f8;
  --surface-3:#e8edf3;
  --fg:#161a20;
  --muted:#697080;
  --muted-2:#9aa1b0;
  --border:#e3e7ee;
  --border-2:#d5dbe4;
  --accent:#7c5cff;
  --accent-strong:#5b44d6;
  --accent-tint:#efecff;
  --accent-text:#5b44d6;
  --pro:#10b981;     --pro-tint:#e7f7f1;  --pro-text:#0a8f68;
  --con:#e5484d;     --con-tint:#fdecec;
  --neu:#9aa0a6;     --neu-tint:#eef0f3;
  --shadow:0 4px 18px rgba(20,28,45,.09),0 1px 4px rgba(20,28,45,.05);
  --shadow-lg:0 16px 44px rgba(20,28,45,.15),0 4px 12px rgba(20,28,45,.07);
  --font:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace;
  --r-panel:16px; --r-field:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);color:var(--fg);background:var(--bg);font-size:15px;line-height:1.55;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow:hidden}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;color:inherit}
input,select{font-family:inherit}
::selection{background:var(--accent-tint)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}

/* ---- map canvas ---- */
#map{position:fixed;inset:0;background:var(--bg)}
#map .maplibregl-canvas{filter:none}
#map .maplibregl-ctrl-attrib,#map .maplibregl-ctrl-bottom-right{opacity:.5}
.map-fallback{position:fixed;inset:0;display:grid;place-items:center;color:var(--muted-2);
  background:radial-gradient(1200px 800px at 50% 30%,#fff,transparent 70%),var(--bg);z-index:0}
.map-fallback span{font-size:13px;letter-spacing:.02em}

/* ---- region marker (maplibre DOM marker) ---- */
.rmk{position:relative;cursor:pointer}
.rmk .bub{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border-2);
  border-radius:999px;padding:4px 9px 4px 5px;box-shadow:var(--shadow);white-space:nowrap;transition:transform .15s,box-shadow .15s}
.rmk:hover{z-index:5}
.rmk:hover .bub{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
/* base = 지역 점 마커 (결과 전) — 지도 안 가리게 작은 dot, 이름은 호버 시 */
.rmk.base .pin{display:block;width:11px;height:11px;border-radius:50%;background:var(--accent);
  border:2px solid #fff;box-shadow:0 1px 5px rgba(20,28,45,.4);transition:transform .12s}
.rmk.base .plabel{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);background:var(--fg);color:#fff;
  font-size:10.5px;font-weight:600;letter-spacing:.01em;padding:2px 8px;border-radius:7px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .12s;box-shadow:var(--shadow)}
.rmk.base:hover{z-index:6}
.rmk.base:hover .pin{transform:scale(1.3)}
.rmk.base:hover .plabel{opacity:1}
/* 행정경계 hover 이름칩 (레퍼런스 Tanglin 칩 스타일) */
.area-chip{position:fixed;z-index:28;pointer-events:none;transform:translate(-50%,-135%);
  background:#fff;border:1px solid var(--border-2);border-radius:11px;padding:7px 13px;
  font-size:13.5px;font-weight:600;color:var(--fg);box-shadow:var(--shadow-lg);white-space:nowrap;
  opacity:0;transition:opacity .1s}
.area-chip.on{opacity:1}
.area-chip .lv{display:block;font-size:9.5px;font-weight:600;letter-spacing:.07em;color:var(--muted);margin-top:1px}
/* 현재 단위 표시 배지 */
.level-pill{position:fixed;top:16px;right:16px;z-index:24;display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:5px 11px;
  font-size:11px;font-weight:500;color:var(--fg);box-shadow:var(--shadow);letter-spacing:.01em}
.level-pill .dotp{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2.5px var(--accent-tint)}
@media (max-width:840px){.level-pill{top:auto;bottom:14px;right:12px}}
/* 선택한 지역 패널 */
.sel-panel{position:fixed;left:16px;bottom:22px;z-index:25;width:256px;max-width:calc(100vw - 32px);max-height:38vh;display:flex;flex-direction:column;overflow:hidden}
.sp-head{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:600;flex:0 0 auto}
.sp-head .sp-n{display:inline-grid;place-items:center;min-width:19px;height:19px;padding:0 5px;border-radius:999px;background:var(--accent);color:#fff;font-size:11px;font-family:var(--mono)}
.sp-head .sp-clear{margin-left:auto;border:0;background:transparent;color:var(--muted);font-size:11.5px;font-weight:500;padding:2px 4px}
.sp-head .sp-clear:hover{color:var(--accent-text)}
.sp-list{overflow-y:auto;padding:10px 12px;display:flex;flex-wrap:wrap;gap:7px;scrollbar-width:thin}
.selchip{display:inline-flex;align-items:center;gap:6px;background:var(--accent-tint);border:1px solid #d8d0fb;border-radius:999px;padding:5px 6px 5px 10px;font-size:12px;font-weight:500;color:var(--accent-text)}
.selchip .lv{font-size:9px;letter-spacing:.04em;color:var(--muted);background:#fff;border-radius:5px;padding:1px 5px}
.selchip .x{width:17px;height:17px;border:0;border-radius:50%;background:rgba(91,68,214,.14);color:var(--accent-strong);font-size:13px;line-height:1;display:grid;place-items:center;cursor:pointer}
.selchip .x:hover{background:var(--accent);color:#fff}
@media (max-width:840px){.sel-panel{bottom:auto;top:172px;left:12px}}
/* 우측 줌/단위 컨트롤 (결과 패널보다 아래 z → 패널 열리면 가려짐) */
.zoom-ctrl{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:24;display:flex;flex-direction:column;gap:8px}
.zc-seg{display:flex;flex-direction:column;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:3px;box-shadow:var(--shadow)}
.zc-seg button{border:0;background:transparent;padding:6px 11px;border-radius:8px;font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;transition:.12s}
.zc-seg button:hover{background:var(--surface-2);color:var(--fg)}
.zc-seg button.on{background:var(--accent);color:#fff}
.zc-pm{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow);overflow:hidden}
.zc-pm button{width:34px;height:34px;border:0;background:transparent;font-size:17px;font-weight:500;color:var(--fg);display:grid;place-items:center;transition:.12s}
.zc-pm button:first-child{border-bottom:1px solid var(--border)}
.zc-pm button:hover{background:var(--surface-2);color:var(--accent-text)}
@media (max-width:840px){.zoom-ctrl{top:auto;bottom:170px;right:12px}}
.rmk .dot{width:16px;height:16px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  font-size:9px;font-weight:700;color:#fff;font-family:var(--mono)}
.rmk .rn{font-size:11.5px;font-weight:600}
.rmk .rp{font-size:10.5px;font-family:var(--mono);color:var(--muted)}

/* ============ shared panel chrome ============ */
.glass{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-panel);box-shadow:var(--shadow)}

/* ---- top brand lockup (좌상단, 알약 아님) ---- */
.titlebar{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:11px;
  background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:9px 16px 9px 11px;box-shadow:var(--shadow)}
.titlebar .mk{width:32px;height:32px;flex:0 0 auto;border-radius:9px;background:var(--accent);display:grid;place-items:center}
.titlebar .mk svg{width:18px;height:18px;color:#fff}
.titlebar .tt{font-size:14.5px;font-weight:600;letter-spacing:-.01em;line-height:1.15;white-space:nowrap}
.titlebar .tt b{color:var(--accent-text);font-weight:600}
.titlebar .tt small{display:block;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.lang-switch{position:fixed;right:16px;bottom:16px;z-index:60;font-family:inherit}
  .lang-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--fg);border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);transition:transform .12s,border-color .15s}
  .lang-btn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .lang-btn>svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
  .lang-btn .chev{width:11px;height:11px;opacity:.55;transition:transform .18s}
  .lang-switch.open .lang-btn .chev{transform:rotate(180deg)}
  .lang-menu{position:absolute;right:0;bottom:calc(100% + 8px);min-width:148px;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:5px;opacity:0;visibility:hidden;transform:translateY(6px);transition:opacity .16s,transform .16s,visibility .16s}
  .lang-switch.open .lang-menu{opacity:1;visibility:visible;transform:translateY(0)}
  .lang-menu button{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;border:0;background:transparent;color:var(--fg);font-size:12.5px;font-weight:500;text-align:left;padding:8px 11px;border-radius:8px;cursor:pointer}
  .lang-menu button:hover{background:var(--surface-2)}
  .lang-menu button.on{color:var(--accent);font-weight:700}
  .lang-menu button.on::after{content:'✓';font-size:11px}
  .titlebar .hist{width:32px;height:32px;flex:0 0 auto;border-radius:9px;border:1px solid var(--border);background:transparent;display:grid;place-items:center;color:var(--muted);margin-left:4px}
.titlebar .hist:hover{background:var(--surface-2);color:var(--fg)}
.titlebar .hist svg{width:16px;height:16px}

/* ---- left audience panel (각진 좌측 레일) ---- */
.audience{position:fixed;top:70px;left:14px;z-index:25;width:288px;max-width:calc(100vw - 28px);
  max-height:calc(100vh - 180px);display:flex;flex-direction:column;border-top:3px solid var(--accent)}
.aud-head{display:flex;align-items:center;gap:9px;padding:11px 14px 9px;border-bottom:1px solid var(--border);flex:0 0 auto}
.aud-head .ic{width:28px;height:28px;border-radius:8px;background:var(--accent-tint);display:grid;place-items:center;flex:0 0 auto}
.aud-head .ic svg{width:15px;height:15px}
.aud-head .ic svg{width:18px;height:18px;color:var(--accent-strong)}
.aud-head h2{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
.aud-head .c{font-size:12px;color:var(--muted)}
.aud-head .cl{margin-left:auto;width:28px;height:28px;border-radius:8px;border:0;background:transparent;display:grid;place-items:center;color:var(--muted-2);transition:.15s}
.aud-head .cl:hover{background:var(--surface-2)}
.aud-head .cl svg{width:15px;height:15px;transition:transform .2s}
.audience.collapsed .cl svg{transform:rotate(180deg)}
.aud-body{overflow-y:auto;padding:11px 14px 14px;display:grid;gap:11px;scrollbar-width:thin}
.audience.collapsed{width:340px}
.audience.collapsed .aud-body{display:none}
.aud-body::-webkit-scrollbar{width:8px}.aud-body::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}

.ds-pill{display:flex;align-items:center;gap:8px;background:var(--accent-tint);border:1px solid #d8d0fb;
  border-radius:9px;padding:9px 12px;color:var(--accent-text);font-size:12.5px;font-weight:500}
.ds-pill svg{width:15px;height:15px;flex:0 0 auto}
.match{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12.5px;color:var(--muted);text-align:center}
.match b{color:var(--fg);font-family:var(--mono);font-weight:600}

.fgrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:grid;gap:6px}
.field .row{display:flex;justify-content:space-between;align-items:baseline}
.field .hint{font-size:10.5px;color:var(--muted-2);font-family:var(--mono)}
.inp{width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-field);
  padding:8px 11px;font-size:13.5px;color:var(--fg);transition:border-color .15s}
.inp:focus{border-color:var(--accent)}

/* ---- custom select (자체 디자인 드롭다운) ---- */
.csel{position:relative}
.csel .trg{width:100%;display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border-2);
  border-radius:var(--r-field);padding:8px 11px;font-size:13.5px;color:var(--fg);text-align:left;transition:border-color .15s,box-shadow .15s}
.csel .trg .lab{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csel .trg .cv{width:13px;height:13px;flex:0 0 auto;color:var(--muted);transition:transform .2s}
.csel .trg:hover{border-color:var(--muted-2)}
.csel.open .trg{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,255,.16)}
.csel.open .trg .cv{transform:rotate(180deg);color:var(--accent-text)}
.csel-menu{position:fixed;z-index:80;background:var(--surface);border:1px solid var(--border);border-radius:13px;
  box-shadow:var(--shadow-lg);padding:6px;max-height:264px;overflow-y:auto;scrollbar-width:thin;
  animation:cselin .14s cubic-bezier(.4,0,.2,1)}
.csel-menu::-webkit-scrollbar{width:8px}.csel-menu::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}
@keyframes cselin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.csel-menu .opt{width:100%;display:flex;align-items:center;gap:8px;padding:9px 11px;border:0;background:transparent;
  border-radius:9px;font-size:13.5px;color:var(--fg);text-align:left;transition:.1s}
.csel-menu .opt:hover,.csel-menu .opt.hl{background:var(--surface-2)}
.csel-menu .opt span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csel-menu .opt.sel{color:var(--accent-text);font-weight:600;background:var(--accent-tint)}
.csel-menu .opt .ck{width:14px;height:14px;flex:0 0 auto;color:var(--accent-strong)}
.range-wrap{display:flex;align-items:center;gap:10px}
input[type=range]{-webkit-appearance:none;flex:1;height:4px;border-radius:99px;background:var(--surface-3);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff;box-shadow:0 0 0 1px var(--border-2)}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff}
.range-val{font-family:var(--mono);font-size:13px;color:var(--accent-text);min-width:34px;text-align:right}
.reset{width:100%;border:1px solid var(--border-2);background:var(--surface);border-radius:var(--r-field);
  padding:9px;font-size:12.5px;font-weight:500;color:var(--fg);transition:.15s}
.reset:hover{background:var(--surface-2);border-color:var(--muted-2)}

/* ---- bottom dock: chips + input ---- */
.dock{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:25;width:min(560px,calc(100vw - 360px));
  display:flex;flex-direction:column;gap:9px;align-items:center}
.chips{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%}
.chip{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);
  border-radius:9px;padding:10px 14px;font-size:13px;color:var(--fg);box-shadow:var(--shadow);text-align:left;transition:.14s;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.chip:hover{border-color:var(--accent);color:var(--accent-text);transform:translateY(-1px)}
.chip svg{width:14px;height:14px;color:var(--accent);flex:0 0 auto}
.chip span{overflow:hidden;text-overflow:ellipsis}
.askbar{display:flex;align-items:center;gap:8px;width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:6px 6px 6px 15px;box-shadow:var(--shadow-lg)}
.askbar input{flex:1;border:0;background:transparent;font-size:13.5px;color:var(--fg);outline:none;padding:6px 0}
.askbar input::placeholder{color:var(--muted-2)}
.send{width:36px;height:36px;flex:0 0 auto;border-radius:9px;border:0;background:var(--accent);display:grid;place-items:center;color:#fff;transition:.15s}
.send:hover{background:var(--accent-strong)}
.send:active{transform:scale(.94)}
.send svg{width:19px;height:19px}
.send.busy{pointer-events:none;opacity:.7}
.send.busy svg{display:none}
.send .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none}
.send.busy .spin{display:block}
@keyframes sp{to{transform:rotate(360deg)}}
.dock-cap{font-size:11px;color:var(--muted-2);letter-spacing:.01em}
.dock-cap b{color:var(--muted);font-weight:500}

/* ---- results panel (right) ---- */
.results{position:fixed;top:78px;right:16px;z-index:26;width:392px;max-width:calc(100vw - 32px);
  max-height:calc(100vh - 116px);display:flex;flex-direction:column;border-top:3px solid var(--accent);
  transform:translateX(calc(100% + 24px));opacity:0;transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .25s;pointer-events:none}
.results.on{transform:none;opacity:1;pointer-events:auto}
.res-head{padding:16px 18px 13px;border-bottom:1px solid var(--border);flex:0 0 auto}
.res-head .q{font-size:14.5px;font-weight:600;line-height:1.45;letter-spacing:-.01em;text-wrap:pretty}
.res-head .meta{margin-top:7px;display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);flex-wrap:wrap}
.res-head .x{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;border:0;background:transparent;display:grid;place-items:center;color:var(--muted-2)}
.res-head .x:hover{background:var(--surface-2)}
.res-body{overflow-y:auto;padding:16px 18px 20px;display:grid;gap:18px;scrollbar-width:thin}
.res-body::-webkit-scrollbar{width:8px}.res-body::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:99px}
.res-sec h3{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:11px}

/* sentiment */
.sentiment{display:flex;height:13px;border-radius:999px;overflow:hidden;margin-bottom:11px;background:var(--surface-3)}
.sentiment i{display:block;height:100%}
.sent-legend{display:flex;gap:14px;flex-wrap:wrap}
.sent-legend .it{display:flex;align-items:center;gap:7px;font-size:12px}
.sent-legend .sw{width:9px;height:9px;border-radius:3px}
.sent-legend .v{font-family:var(--mono);font-weight:600;margin-left:1px}
.sent-legend .k{color:var(--muted)}

/* theme bars */
.theme{margin-bottom:10px}
.theme .tr{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.theme .tr .pc{font-family:var(--mono);color:var(--muted)}
.theme .bar{height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden}
.theme .bar i{display:block;height:100%;border-radius:99px}

/* quotes */
.quote{border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:10px;background:var(--surface)}
.quote .who{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.quote .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:0 0 auto;font-family:var(--mono)}
.quote .nm{font-size:12.5px;font-weight:600}
.quote .tags{font-size:11px;color:var(--muted)}

/* empty hint inside results before content (not used normally) */
.toast{position:fixed;left:50%;bottom:96px;transform:translate(-50%,12px);z-index:60;opacity:0;background:var(--fg);color:#fff;
  border-radius:10px;padding:9px 15px;font-size:12.5px;transition:.2s;pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.on{opacity:1;transform:translate(-50%,0)}

/* history dropdown */
.histmenu{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-6px);z-index:40;width:min(380px,calc(100vw - 32px));
  padding:7px;opacity:0;pointer-events:none;transition:.18s}
.histmenu.on{opacity:1;pointer-events:auto;transform:translateX(-50%)}
.histmenu .hi{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:11px;font-size:13px;color:var(--fg);width:100%;border:0;background:transparent;text-align:left}
.histmenu .hi:hover{background:var(--surface-2)}
.histmenu .hi svg{width:13px;height:13px;color:var(--muted-2);flex:0 0 auto}
.histmenu .hi span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.histmenu .empty{padding:14px;text-align:center;color:var(--muted-2);font-size:12.5px}

/* ---- responsive ---- */
@media (max-width:1100px){
  .dock{width:min(620px,calc(100vw - 36px))}
}
@media (max-width:840px){
  .audience{top:74px;left:12px;right:12px;width:auto;max-height:46vh}

}

<script>
/* =====================================================================
   만약 대한민국이라면 — 합성 페르소나 의견 시뮬레이터
   * 의견 수치는 LLM이 아니라 아래 결정론적 모델이 산출 (가정 기반).
   * 페르소나는 합성(목업) 데이터. 실제 개인/실측 여론조사가 아님.
   ===================================================================== */
const $=id=>document.getElementById(id);

/* ---- 17 시도: 코드, 이름, 중심 좌표, 인구 가중치(표본 분포용) ---- */
const SIDO=[
 {c:'11',n:'서울',lat:37.566,lng:126.978,w:.182,metro:1},
 {c:'41',n:'경기',lat:37.41, lng:127.52, w:.262,metro:1},
 {c:'28',n:'인천',lat:37.456,lng:126.705,w:.058,metro:1},
 {c:'30',n:'대전',lat:36.35, lng:127.385,w:.028,metro:.6},
 {c:'27',n:'대구',lat:35.87, lng:128.60, w:.046,metro:.6},
 {c:'26',n:'부산',lat:35.18, lng:129.075,w:.063,metro:.6},
 {c:'29',n:'광주',lat:35.16, lng:126.85, w:.027,metro:.6},
 {c:'31',n:'울산',lat:35.54, lng:129.31, w:.021,metro:.5},
 {c:'36',n:'세종',lat:36.56, lng:127.29, w:.0075,metro:.7},
 {c:'42',n:'강원',lat:37.86, lng:128.31, w:.029,metro:0},
 {c:'43',n:'충북',lat:36.80, lng:127.70, w:.031,metro:.2},
 {c:'44',n:'충남',lat:36.60, lng:126.80, w:.041,metro:.2},
 {c:'45',n:'전북',lat:35.70, lng:127.10, w:.034,metro:0},
 {c:'46',n:'전남',lat:34.80, lng:126.90, w:.035,metro:0},
 {c:'47',n:'경북',lat:36.40, lng:128.90, w:.049,metro:.1},
 {c:'48',n:'경남',lat:35.40, lng:128.20, w:.063,metro:.2},
 {c:'50',n:'제주',lat:33.43, lng:126.56, w:.013,metro:.1},
];
const byCode={}; SIDO.forEach(s=>byCode[s.c]=s);
const JOBS=['학생','직장인','자영업','전문직','공무원','주부','은퇴','프리랜서'];
const INDS=['제조','IT·서비스','유통·서비스','교육','의료·복지','금융','공공','농림어업'];
const EDUS=['고졸 이하','대재·대졸','대학원'];
let POOL_TOTAL=51300;
let AGEDIST=null; /* 실측 성인 연령대 분포(a=20-34,b=35-64 누적기준) — 실데이터 로드 시 설정 */

/* deterministic hash → [0,1) */
function h01(n){n=(n^61)^(n>>>16);n=(n+(n<<3))>>>0;n^=n>>>4;n=Math.imul(n,0x27d4eb2d);n^=n>>>15;return ((n>>>0)%100000)/100000;}
function pick(arr,r){return arr[Math.floor(r*arr.length)%arr.length];}

/* ---- 합성 페르소나 풀 (대표 표본 600, 화면 수치는 풀 전체로 스케일)
   region 가중치(SIDO.w)·연령분포(AGEDIST)는 실데이터 로드 시 실측 인구로 대체 ---- */
function genPersonas(){
  const out=[]; const N=600;
  const cum=[]; let acc=0; SIDO.forEach(s=>{acc+=s.w;cum.push(acc);}); const tot=acc;
  for(let i=0;i<N;i++){
    const rr=h01(i*7+3)*tot; let si=cum.findIndex(x=>rr<=x); if(si<0)si=SIDO.length-1;
    const s=SIDO[si];
    const ar=h01(i*13+5);
    let age;
    if(AGEDIST){ // 실측 성인 연령대 분포 반영 (0-19 제외한 성인 여론풀)
      if(ar<AGEDIST.a)age=20+Math.floor(h01(i*3+1)*15);
      else if(ar<AGEDIST.a+AGEDIST.b)age=35+Math.floor(h01(i*3+2)*30);
      else age=65+Math.floor(h01(i*3+11)*25);
    } else {
      if(ar<.16)age=18+Math.floor(h01(i*3+1)*17); else if(ar<.42)age=35+Math.floor(h01(i*3+2)*15);
      else if(ar<.68)age=50+Math.floor(h01(i*3+9)*15); else age=65+Math.floor(h01(i*3+11)*22);
    }
    const sex=h01(i*17+2)<.5?'m':'f';
    const job=age<25?(h01(i*5)<.7?'학생':'프리랜서'):age>=63?(h01(i*5)<.62?'은퇴':pick(['자영업','주부','직장인'],h01(i*23))):pick(JOBS.slice(1,6).concat(['프리랜서','자영업']),h01(i*29+4));
    const ind=pick(INDS,h01(i*31+6));
    const edu=h01(i*37+8); const eduV=edu<.28?'고졸 이하':edu<.86?'대재·대졸':'대학원';
    out.push({id:i,r:s.c,region:s.n,metro:s.metro,age,sex,job,ind,edu:eduV});
  }
  return out;
}
let PERSONAS=genPersonas();

/* ---- 실측 시도 인구 반영 (행안부 주민등록 2026-05) — JS만, DOM/CSS 무손 ---- */
async function loadRealPop(){
  const M={'서울':'11','경기':'31','인천':'23','대전':'25','대구':'22','부산':'21','광주':'24','울산':'26','세종':'29','강원':'32','충북':'33','충남':'34','전북':'35','전남':'36','경북':'37','경남':'38','제주':'39'};
  try{
    const pop=await fetch('./data/population.json').then(r=>{if(!r.ok)throw 0;return r.json();});
    let natl=0; SIDO.forEach(s=>{const a=pop.areas[M[s.n]]; if(a){s.w=a.total; natl+=a.total;}});
    if(!natl)throw 0;
    SIDO.forEach(s=>{s.w=s.w/natl;});                 // 실측 인구 점유율
    let y=0,m=0,o=0; for(const c in pop.areas){const b=pop.areas[c].bands; y+=b['20-34']; m+=b['35-64']; o+=b['65+'];}
    const adult=y+m+o; AGEDIST={a:y/adult,b:m/adult};  // 성인 연령대 분포
    POOL_TOTAL=natl; PERSONAS=genPersonas();
    const kn=(POOL_TOTAL).toLocaleString('ko-KR');
    $('poolTotal').textContent=kn;
    const ds=document.querySelector('.ds-pill'); if(ds)ds.innerHTML=ds.innerHTML.replace(/51,300/g,kn);
    const dc=document.querySelector('.dock-cap'); if(dc)dc.innerHTML=dc.innerHTML.replace(/51,300/g,kn);
    updateMatch();
    if(typeof toast==='function')toast('실측 인구('+(pop.basePeriod||pop.baseYear)+') 반영됨');
  }catch(e){ /* 실패 시 합성 기본값 유지 */ }
}

/* ---- filters ---- */
const F={minAge:18,maxAge:85,sex:'all',job:'all',ind:'all',edu:'all',region:'all'};
function matches(p){
  return p.age>=F.minAge && p.age<=F.maxAge
    && (F.sex==='all'|| (F.sex==='m'?p.sex==='m':p.sex==='f'))
    && (F.job==='all'||p.job===F.job)
    && (F.ind==='all'||p.ind===F.ind)
    && (F.edu==='all'||p.edu===F.edu)
    && (F.region==='all'||p.r===F.region);
}
function filtered(){return PERSONAS.filter(matches);}
function updateMatch(){
  const f=filtered(); const ratio=f.length/PERSONAS.length;
  const est=Math.round(POOL_TOTAL*ratio);
  $('matchCount').textContent=est.toLocaleString('ko-KR');
  return f;
}

/* ============ 질문(인구 감소 주제) ============
   각 질문: 기본 성향 bias, 연령·수도권·성별 가중, 찬/반 테마, 인용 템플릿 */
const Q_KO=[
 {id:'q_settle', t:'지방 소멸을 막기 위해 청년 정착 지원금을 줘야 할까요?',
   bias:.18, age:-.004, metro:-.34, sex:0,
   pro:['지방 인구 유출을 늦추는 직접적 수단','청년 주거·창업 부담 완화','균형발전의 마중물'],
   con:['재정 부담과 지속가능성 의문','지원금만으로 정착 유인 부족','일자리 없으면 효과 제한적'],
   qpro:['지원금이 있으면 고향에 남는 걸 진지하게 고민할 것 같아요.','청년이 떠나면 동네 상권부터 무너집니다. 직접 지원이 맞아요.'],
   qcon:['돈만 주면 뭐하나요. 일자리가 없으면 결국 다시 떠납니다.','세금으로 매년 감당할 수 있을지 의문이에요.'],
   qneu:['취지는 공감하지만 일자리·정주 여건이 같이 가야 한다고 봐요.']},
 {id:'q_relocate', t:'수도권 집중 완화를 위해 공공기관을 더 지방으로 이전해야 할까요?',
   bias:.08, age:.001, metro:-.5, sex:0,

/* ---- 의견 시뮬레이션 ---- */
function simulate(q, sample){
  // stance score per persona
  const res=sample.map(p=>{
    let s=q.bias + (p.age-45)*q.age + (p.metro-0.4)*q.metro + (p.sex==='f'?q.sex:-q.sex)*0.5;
    s += (h01(p.id*131 + q.id.length*977 + q.t.length*31)-0.5)*0.9; // spread
    let st = s>0.16?'pro':s<-0.16?'con':'neu';
    return {p,s,st};
  });
  const n=res.length;
  const cPro=res.filter(r=>r.st==='pro').length, cCon=res.filter(r=>r.st==='con').length, cNeu=n-cPro-cCon;
  // themes
  const proTh=q.pro.map(l=>({l,v:0})), conTh=q.con.map(l=>({l,v:0}));
  res.forEach(r=>{ const idx=Math.floor(h01(r.p.id*53+q.id.length*17)*1000);
    if(r.st==='pro')proTh[idx%proTh.length].v++; else if(r.st==='con')conTh[idx%conTh.length].v++; });
  // region split
  const reg={}; res.forEach(r=>{const k=r.p.r;(reg[k]=reg[k]||{pro:0,con:0,neu:0,n:0});reg[k][r.st]++;reg[k].n++;});
  // quotes: representative across stances
  function qpick(stance,arr,count){
    const pool=res.filter(r=>r.st===stance);
    const out=[];
    for(let i=0;i<count && i<pool.length;i++){
      const r=pool[Math.floor(h01(i*97+q.id.length*7)*pool.length)%pool.length];
      const tx=arr[Math.floor(h01(r.p.id*41+i*13)*arr.length)%arr.length];
      out.push({p:r.p,st:stance,tx});
    }
    return out;
  }
  let quotes=[];
  if(cPro>=cCon){quotes=qpick('pro',q.qpro,2).concat(qpick('con',q.qcon,1),qpick('neu',q.qneu,1));}
  else {quotes=qpick('con',q.qcon,2).concat(qpick('pro',q.qpro,1),qpick('neu',q.qneu,1));}
  quotes=quotes.filter(Boolean);
  return {n,cPro,cCon,cNeu,proTh,conTh,reg,quotes};
}

  $('resQ').textContent=q.t;

  const pct=c=>sim.n?Math.round(c/sim.n*100):0;
  const pPro=pct(sim.cPro),pCon=pct(sim.cCon),pNeu=100-pPro-pCon;
  const stanceMaj=sim.cPro>=sim.cCon?'pro':'con';
  const sumLine = stanceMaj==='pro'
    ? `표본의 <b>${pPro}%</b>가 찬성으로 기울었습니다.`
    : `표본의 <b>${pCon}%</b>가 반대로 기울었습니다.`;

      <div class="bar"><i style="width:${Math.max(4,t.v/mx*100)}%;background:${color}"></i></div></div>`).join('');};

  const avatar=(p)=>{const col=stanceColor(); return col;};
  const quoteCard=(qq)=>{
    const stColor={pro:'var(--pro)',con:'var(--con)',neu:'var(--neu)'}[qq.st];

        <span class="st ${qq.st}">${stLabel}</span>
      </div>
      <div class="tx">${qq.tx}</div></div>`;
  };

  // region rows (top by sample count)
  const regRows=Object.entries(sim.reg).sort((a,b)=>b[1].n-a[1].n).slice(0,8).map(([k,v])=>{
    const p=v.n?Math.round(v.pro/v.n*100):0,c=v.n?Math.round(v.con/v.n*100):0,nu=100-p-c;
    return `<tr><td class="rn">${byCode[k].n}</td>
      <td><div class="mini"><i style="width:${p}%;background:var(--pro)"></i><i style="width:${nu}%;background:var(--neu)"></i><i style="width:${c}%;background:var(--con)"></i></div></td>
      <td class="pcell">${p}%</td></tr>`;}).join('');

  $('resBody').innerHTML=`
    <div class="res-sec">
      <h3>전체 의견 분포</h3>
      <div class="sentiment">
        <i style="width:${pPro}%;background:var(--pro)"></i>
        <i style="width:${pNeu}%;background:var(--neu)"></i>

        <span class="it"><span class="sw" style="background:var(--pro)"></span><span class="k">찬성</span><span class="v">${pPro}%</span></span>
        <span class="it"><span class="sw" style="background:var(--neu)"></span><span class="k">중립</span><span class="v">${pNeu}%</span></span>
        <span class="it"><span class="sw" style="background:var(--con)"></span><span class="k">반대</span><span class="v">${pCon}%</span></span>
      </div>
      <p style="margin-top:11px;font-size:13.5px;color:#34383d">${sumLine} 아래는 ${stanceMaj==='pro'?'주요 찬성·반대':'주요 반대·찬성'} 논거와 대표 의견입니다.</p>

    <div class="res-sec"><h3>대표 의견</h3>${sim.quotes.map(quoteCard).join('')}</div>

    <div class="res-sec"><h3>지역별 찬성률</h3>
      <table class="rtbl"><tbody>${regRows}</tbody></table>
    </div>

    <div class="disc"><b>참고 ·</b> 이 결과는 실제 여론조사가 아니라 <b>합성 페르소나</b>의 속성에 기반한 가정 시뮬레이션입니다. 인구·정책 변수의 단순 가중 모델로 산출되며, 실제 응답·통계와 다를 수 있습니다.</div>
  `;
  $('results').classList.add('on');
  paintMarkers(sim);
}
function stanceColor(){return 'var(--accent)';}

/* ---- map: 행정경계 줌 연동 (시도→시군구→읍면동) ---- */
let map=null, mapReady=false, curLevel=null, CURsim=null, hoverId=null, selId=null;
const GH='https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2018/json/';
const ADMIN={
  sido:{max:8.3,  url:GH+'skorea-provinces-2018-geo.json',        label:'시·도'},
  sgg: {max:10.0, url:GH+'skorea-municipalities-2018-geo.json',   label:'시·군·구'},
  emd: {max:99,   url:GH+'skorea-submunicipalities-2018-geo.json',label:'읍·면·동'},
};
const adminCache={};
function levelForZoom(z){ return z<ADMIN.sido.max?'sido':z<ADMIN.sgg.max?'sgg':'emd'; }

function initMap(){
  if(!window.maplibregl){ return false; }
  try{
    map=new maplibregl.Map({
      container:'map',
      style:{version:8,
        sources:{
          carto:{type:'raster',tiles:['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png','https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png','https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png'],tileSize:256,attribution:'© OpenStreetMap · © CARTO'}
        },
        layers:[
          {id:'bg',type:'background',paint:{'background-color':'#dbe4ef'}},
          {id:'carto',type:'raster',source:'carto'}
        ]},
      center:[127.9,35.9], zoom:5.7, minZoom:4.4, maxZoom:18, attributionControl:false,
      maxBounds:[[119.5,29.5],[136.0,41.5]], renderWorldCopies:false, dragRotate:false
    });
    map.addControl(new maplibregl.AttributionControl({compact:true}));
    map.on('load',()=>{
      $('mapFallback').style.display='none';
      map.addSource('admin',{type:'geojson',data:{type:'FeatureCollection',features:[]},generateId:true});
      map.addLayer({id:'admin-fill',type:'fill',source:'admin',
        paint:{'fill-color':'#7c5cff','fill-opacity':['case',['boolean',['feature-state','hover'],false],0.32,0.10]}});
      map.addLayer({id:'admin-line',type:'line',source:'admin',
        paint:{'line-color':'rgba(91,68,214,.5)','line-width':['case',['boolean',['feature-state','hover'],false],1.8,0.6]}});
      map.addLayer({id:'admin-selfill',type:'fill',source:'admin',
        filter:['in',['to-string',['get','code']],['literal',['__none__']]],
        paint:{'fill-color':'#7c5cff','fill-opacity':0.28}});
      map.addLayer({id:'admin-sel',type:'line',source:'admin',
        filter:['in',['to-string',['get','code']],['literal',['__none__']]],
        paint:{'line-color':'#5b44d6','line-width':2.8}});
      try{ map.setPadding({top:78,bottom:150,left:12,right:12}); }catch(_){}
      mapReady=true; wireMapInteract(); wireZoomCtrl(); setLevel(levelForZoom(map.getZoom()),true);
    });
    map.on('zoom',()=>{ if(!mapReady)return; const lv=levelForZoom(map.getZoom()); if(lv!==curLevel)setLevel(lv); });
    map.on('error',()=>{});
    return true;
  }catch(e){ return false; }
}
function setLevelPill(lv){ const el=$('levelPill'); const k={sido:'lvSido',sgg:'lvSgg',emd:'lvEmd'}[lv];
  const lbl=(typeof I18N!=='undefined'&&I18N[LANG]&&I18N[LANG][k])||ADMIN[lv].label;
  if(el)el.innerHTML=`<span class="dotp"></span>${lbl}`; setActiveLevelBtn(lv); }
function setActiveLevelBtn(lv){ const seg=$('zcSeg'); if(seg) seg.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.lv===lv)); }
function wireZoomCtrl(){
  const tgt={sido:7,sgg:9.6,emd:12.5};
  $('zcSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{ map.easeTo({zoom:tgt[b.dataset.lv],center:map.getCenter(),duration:650}); });
  $('zcIn').onclick=()=>map.easeTo({zoom:Math.min(map.getZoom()+1,18),duration:300});
  $('zcOut').onclick=()=>map.easeTo({zoom:Math.max(map.getZoom()-1,4.4),duration:300});
}
async function setLevel(lv,force){
  if(!mapReady||(lv===curLevel&&!force)) return;
  curLevel=lv; hoverId=selId=null; setLevelPill(lv);
  let gj=adminCache[lv];
  if(!gj){
    if(lv==='emd') toast('읍·면·동 경계 불러오는 중…');
    try{ const r=await fetch(ADMIN[lv].url); if(!r.ok)throw 0; gj=await r.json(); adminCache[lv]=gj; }
    catch(e){ toast('경계 데이터를 불러오지 못했습니다'); return; }
    if(curLevel!==lv) return; // 로딩 중 줌이 바뀜
  }
  if(map.getSource('admin')) map.getSource('admin').setData(gj);
  if(lv==='sido') buildMask(gj);
  repaintFill(); updateSelLayer();
}
/* 한국 외부를 가리는 마스크 (세계 사각형 − 시도 외곽선 구멍) → 다른 나라 숨김 */
function buildMask(gj){
  if(!map||!map.getSource('mask')||!gj||!gj.features) return;
  const holes=[];
  gj.features.forEach(f=>{const g=f.geometry; if(!g)return;
    if(g.type==='Polygon') holes.push(g.coordinates[0]);
    else if(g.type==='MultiPolygon') g.coordinates.forEach(poly=>holes.push(poly[0]));
  });
  const world=[[119,29],[137,29],[137,42],[119,42],[119,29]];
  try{ map.getSource('mask').setData({type:'Feature',geometry:{type:'Polygon',coordinates:[world,...holes]}}); }catch(_){}
}
function provFillStops(){
  const out=[]; Object.entries(CURsim.reg).forEach(([k,v])=>{ if(!v.n)return; out.push(k, v.pro>=v.con?'#10b981':'#e5484d'); });
  return out;
}
function repaintFill(){
  if(!mapReady||!map.getLayer('admin-fill')) return;
  if(CURsim){
    const stops=provFillStops();
    if(stops.length){
      map.setPaintProperty('admin-fill','fill-color',['match',['slice',['to-string',['get','code']],0,2],...stops,'#9aa0a6']);
    } else { map.setPaintProperty('admin-fill','fill-color','#9aa0a6'); }
    map.setPaintProperty('admin-fill','fill-opacity',['case',['boolean',['feature-state','hover'],false],0.6,0.42]);
  } else {
    map.setPaintProperty('admin-fill','fill-color','#7c5cff');
    map.setPaintProperty('admin-fill','fill-opacity',['case',['boolean',['feature-state','hover'],false],0.22,0.0]);
  }
}
function wireMapInteract(){
  const chip=$('areaChip');
  map.on('mousemove','admin-fill',e=>{
    const f=e.features&&e.features[0]; if(!f)return;
    map.getCanvas().style.cursor='pointer';
    if(hoverId!==null) map.setFeatureState({source:'admin',id:hoverId},{hover:false});
    hoverId=f.id; map.setFeatureState({source:'admin',id:hoverId},{hover:true});
    const nm=f.properties.name||f.properties.name_eng||'—';
    chip.innerHTML=`${nm}<span class="lv">${ADMIN[curLevel].label}</span>`;
    chip.style.left=e.originalEvent.clientX+'px'; chip.style.top=e.originalEvent.clientY+'px';
    chip.classList.add('on');
  });
  map.on('mouseleave','admin-fill',()=>{
    map.getCanvas().style.cursor='';
    if(hoverId!==null) map.setFeatureState({source:'admin',id:hoverId},{hover:false});
    hoverId=null; chip.classList.remove('on');
  });
  map.on('click','admin-fill',e=>{
    const f=e.features&&e.features[0]; if(!f)return;
    toggleSelect(String(f.properties.code), f.properties.name||'—', curLevel);
  });
}

/* ---- 선택 항목 (다중, 클릭 토글) ---- */
const SELSET=new Map();  // key=level|code → {code,name,level}
function selKey(lv,code){return lv+'|'+code;}
function toggleSelect(code,name,lv){
  const k=selKey(lv,code);
  if(SELSET.has(k)){ SELSET.delete(k); toast(`${name} 선택 해제`); }
  else { SELSET.set(k,{code,name,level:lv}); toast(`${name} 선택됨 · ${ADMIN[lv].label}`); }
  updateSelLayer(); renderSelList();
}
function updateSelLayer(){
  if(!mapReady||!map.getLayer('admin-sel')) return;
  const codes=[...SELSET.values()].map(s=>s.code);
  const filt=['in',['to-string',['get','code']],['literal',codes.length?codes:['__none__']]];
  map.setFilter('admin-sel',filt); map.setFilter('admin-selfill',filt);
}
function renderSelList(){
  const wrap=$('selPanel'), list=$('selList');
  if(!wrap) return;
  if(SELSET.size===0){ wrap.style.display='none'; return; }
  wrap.style.display='';
  $('selCount').textContent=SELSET.size;
  list.innerHTML=[...SELSET.values()].map(s=>
    `<span class="selchip" data-k="${selKey(s.level,s.code)}"><span class="lv">${ADMIN[s.level].label}</span>${s.name}<button class="x" aria-label="제거">×</button></span>`).join('');
  list.querySelectorAll('.selchip').forEach(c=>{
    c.querySelector('.x').onclick=()=>{ SELSET.delete(c.dataset.k); updateSelLayer(); renderSelList(); };
  });
}
function clearSel(){ SELSET.clear(); updateSelLayer(); renderSelList(); }
/* 호환 wrappers (기존 호출부 유지) */
function clearMarkers(){}
function baseMarkers(){ CURsim=null; repaintFill(); }
function paintMarkers(sim){ CURsim=sim; repaintFill(); }

/* ---- run a question ---- */
let running=false, lastQ=null;
const history=[];
function runQuestion(q){
  if(running) return; running=true;
  $('sendBtn').classList.add('busy');
  const sample=updateMatch();
  // honor 표본 크기: cap sample
  const size=Math.min(parseInt($('sampleSize').value,10)||60, sample.length);
  const use=sample.slice(0,size);
  lastQ=q;
  setTimeout(()=>{
    const sim=simulate(q,use.length?use:sample.slice(0,30));
    renderResults(q,use,sim);
    running=false; $('sendBtn').classList.remove('busy');
    addHistory(q);
    toast(`${use.length}명 응답 분석 완료`);
  },560);
}
function freeQuestion(text){
  // map free text to nearest known question by keyword, else generic settle
  const t=text;
  let q=QUESTIONS.find(q=>{
    if(/정착|지원금|청년/.test(t)&&q.id==='q_settle')return true;
    if(/공공기관|이전|수도권|분산/.test(t)&&q.id==='q_relocate')return true;
    if(/육아|휴직|저출생|출산.*휴/.test(t)&&q.id==='q_leave')return true;
    if(/정년|65세|연장|노후/.test(t)&&q.id==='q_retire')return true;
    if(/이민|외국인|이주/.test(t)&&q.id==='q_immig')return true;
    if(/주\s?4|4일제|근무|워라밸/.test(t)&&q.id==='q_4day')return true;
    return false;
  });
  if(!q){ q={...QUESTIONS[0], id:'q_custom_'+t.length, t:t}; }
  runQuestion(q);
}

/* ---- history ---- */
function addHistory(q){
  if(history.find(h=>h.t===q.t)) { history.splice(history.findIndex(h=>h.t===q.t),1); }
  history.unshift({t:q.t,q}); if(history.length>8)history.pop();
  renderHistory();
}
function renderHistory(){
  const m=$('histMenu');
  if(!history.length){ m.innerHTML='<div class="empty">아직 질문 기록이 없습니다</div>'; return; }
  m.innerHTML=history.map((h,i)=>`<button class="hi" data-i="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 106 5.3L3 8"/></svg><span>${h.t}</span></button>`).join('');
  m.querySelectorAll('.hi').forEach(b=>b.onclick=()=>{m.classList.remove('on');runQuestion(history[+b.dataset.i].q);});
}

/* ---- suggested chips ---- */
function renderChips(){
  $('chips').innerHTML=QUESTIONS.map((q,i)=>`<button class="chip" data-i="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/></svg><span>${q.t}</span></button>`).join('');
  $('chips').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{$('ask').value=QUESTIONS[+b.dataset.i].t;runQuestion(QUESTIONS[+b.dataset.i]);});
}

/* ---- custom select (자체 디자인 드롭다운) ---- */
const CK='<svg class="ck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
const CV='<svg class="cv" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
let openSel=null;
function closeSel(){ if(openSel){openSel(); openSel=null;} }
function makeSelect(host, opts, value, onChange){
  host.classList.add('csel');
  host.innerHTML=`<button class="trg" type="button"><span class="lab"></span>${CV}</button>`;
  const trg=host.querySelector('.trg'), lab=host.querySelector('.lab');
  let val=value, menu=null;
  const labelOf=v=>{const o=opts.find(o=>o.v===v);return o?o.l:'';};
  function setVal(v,fire){val=v;host.dataset.value=v;lab.textContent=labelOf(v);if(fire&&onChange)onChange(v);}
  function close(){if(!menu)return;menu.remove();menu=null;host.classList.remove('open');
    document.removeEventListener('mousedown',onDoc,true);window.removeEventListener('scroll',close,true);window.removeEventListener('resize',close);openSel=null;}
  function onDoc(e){if(menu&&!menu.contains(e.target)&&!host.contains(e.target))close();}
  function open(){
    closeSel();
    menu=document.createElement('div');menu.className='csel-menu';
    menu.innerHTML=opts.map(o=>`<button class="opt${o.v===val?' sel':''}" type="button" data-v="${o.v}"><span>${o.l}</span>${o.v===val?CK:''}</button>`).join('');
    document.body.appendChild(menu);
    const r=trg.getBoundingClientRect();
    menu.style.left=r.left+'px'; menu.style.width=r.width+'px';
    const mh=menu.offsetHeight;
    menu.style.top=(r.bottom+6+mh>window.innerHeight-12 && r.top-6-mh>12 ? r.top-6-mh : r.bottom+6)+'px';
    host.classList.add('open');
    menu.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{setVal(b.dataset.v,true);close();});
    setTimeout(()=>{document.addEventListener('mousedown',onDoc,true);window.addEventListener('scroll',close,true);window.addEventListener('resize',close);},0);
    openSel=close;
  }
  trg.onclick=e=>{e.stopPropagation();host.classList.contains('open')?close():open();};
  setVal(value,false);
  return {set:v=>setVal(v,false), get:()=>val};
}
const optAll=(arr,label)=>[{v:'all',l:label}].concat(arr.map(x=>({v:x,l:x})));
const SELS={
  sex: makeSelect($('sex'),[{v:'all',l:'전체'},{v:'m',l:'남성'},{v:'f',l:'여성'}],'all',readFilters),
  job: makeSelect($('job'),optAll(JOBS,'전체 직업'),'all',readFilters),
  ind: makeSelect($('ind'),optAll(INDS,'전체 산업'),'all',readFilters),
  edu: makeSelect($('edu'),optAll(EDUS,'전체 학력'),'all',readFilters),
  region: makeSelect($('region'),[{v:'all',l:'전체 지역'}].concat(SIDO.map(s=>({v:s.c,l:s.n}))),'all',readFilters),
};
$('poolTotal').textContent=POOL_TOTAL.toLocaleString('ko-KR');

/* ---- wire filters ---- */
function readFilters(){
  F.minAge=Math.min(+$('minAge').value||18,+$('maxAge').value||85);
  F.maxAge=Math.max(+$('minAge').value||18,+$('maxAge').value||85);
  F.sex=$('sex').dataset.value; F.job=$('job').dataset.value; F.ind=$('ind').dataset.value;
  F.edu=$('edu').dataset.value; F.region=$('region').dataset.value;
  updateMatch();
}
['minAge','maxAge'].forEach(id=>$(id).addEventListener('change',readFilters));
$('sampleSize').addEventListener('input',e=>$('sampleVal').textContent=e.target.value);
$('resetBtn').onclick=()=>{
  $('minAge').value=18;$('maxAge').value=85;
  SELS.sex.set('all');SELS.job.set('all');SELS.ind.set('all');SELS.edu.set('all');SELS.region.set('all');
  $('sampleSize').value=60;$('sampleVal').textContent='60';readFilters();toast('필터 초기화됨');
};

/* ---- ask bar ---- */
$('sendBtn').onclick=()=>{const v=$('ask').value.trim(); if(!v){toast('질문을 입력하거나 추천 질문을 눌러보세요');return;} freeQuestion(v);};
$('ask').addEventListener('keydown',e=>{if(e.key==='Enter')$('sendBtn').onclick();});

/* ---- audience collapse ---- */
$('audToggle').onclick=()=>$('audience').classList.toggle('collapsed');

/* ---- history toggle ---- */
$('histBtn').onclick=(e)=>{e.stopPropagation();$('histMenu').classList.toggle('on');};
document.addEventListener('click',e=>{if(!$('histMenu').contains(e.target)&&e.target!==$('histBtn'))$('histMenu').classList.remove('on');});

/* ---- results close ---- */
$('resClose').onclick=()=>{$('results').classList.remove('on');baseMarkers();};
$('selClear').onclick=clearSel;
(function(){const NM={ko:'한국어',ja:'日本語',en:'English'};
  const sw=$('langSwitch'),btn=$('langBtn'),menu=$('langMenu'),cur=$('langCur');
  function sync(){cur.textContent=NM[LANG]||LANG;menu.querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.l===LANG));}
  btn.onclick=e=>{e.stopPropagation();const o=sw.classList.toggle('open');btn.setAttribute('aria-expanded',o);};
  menu.querySelectorAll('button').forEach(b=>b.onclick=()=>{applyLang(b.dataset.l);sync();sw.classList.remove('open');btn.setAttribute('aria-expanded','false');});
  document.addEventListener('click',e=>{if(!sw.contains(e.target)){sw.classList.remove('open');btn.setAttribute('aria-expanded','false');}});
  sync();})();

/* ---- toast ---- */
let tt; function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('on'),2100);}

/* ---- boot ---- */
renderChips(); renderHistory(); updateMatch();
if(!initMap()){ $('mapFallback').querySelector('span').textContent='지도를 불러오지 못했지만 의견 분석은 그대로 사용할 수 있습니다.'; }
loadRealPop();  /* 실측 시도 인구 반영 (JS만) */
</script>
